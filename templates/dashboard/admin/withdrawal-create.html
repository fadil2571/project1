{% extends 'layouts/base/dashboard_base.html' %}
{% load static %}
{% block title %}Request Withdrawal - Kopmas Shop{% endblock %}
{% block content %}
<div class="flex flex-col gap-5 rounded-[20px] bg-white p-5">
  <h2 class="font-bold text-xl">Request Withdrawal</h2>
  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <div class="flex flex-col gap-2">
      <label class="font-semibold text-custom-grey">Amount</label>
      <input
        name="amount"
        type="number"
        class="h-14 w-full rounded-2xl border border-custom-stroke px-5 font-medium focus:outline-none focus:ring-2 ring-custom-blue transition-300"
        placeholder="Enter withdrawal amount"
      />
    </div>
    <div class="flex flex-col gap-2">
      <label class="font-semibold text-custom-grey">Bank Name</label>
      <input
        name="bank_name"
        class="h-14 w-full rounded-2xl border border-custom-stroke px-5 font-medium focus:outline-none focus:ring-2 ring-custom-blue transition-300"
        placeholder="e.g. BCA, BNI, Mandiri"
      />
    </div>
    <div class="flex flex-col gap-2">
      <label class="font-semibold text-custom-grey">Account Number</label>
      <input
        name="account_number"
        class="h-14 w-full rounded-2xl border border-custom-stroke px-5 font-medium focus:outline-none focus:ring-2 ring-custom-blue transition-300"
        placeholder="Enter bank account number"
      />
    </div>
    <button
      type="submit"
      class="flex h-14 w-fit items-center rounded-full bg-custom-blue px-8 font-semibold text-white hover:ring-2 ring-custom-blue transition-300"
    >
      Submit Request
    </button>
  </form>
</div>
{% endblock %}
