      <!-- Header -->
      <header id="topbar" class="sticky top-0 z-40 bg-white">
        <div class="flex items-center justify-between px-5 py-4">
          <!-- Mobile toggle -->
          <button
            id="sidebar-toggle"
            class="lg:hidden flex items-center justify-center size-10 rounded-xl hover:bg-gray-100 transition-300"
          >
            <svg
              class="size-6 text-custom-grey"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
          <div class="lg:hidden"></div>
          <!-- Right side -->
          <div class="flex items-center gap-3">
            <!-- Notification Bell -->
            <button
              class="relative flex items-center justify-center size-10 rounded-xl hover:bg-gray-100 transition-300"
            >
              <svg
                class="size-6 text-custom-grey"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                />
              </svg>
              <span
                class="absolute top-2 right-2 flex size-2.5 bg-green-500 rounded-full border-2 border-white"
              ></span>
            </button>
            <!-- User Avatar + Dropdown -->
            <div class="relative" id="avatar-dropdown-container">
              <button
                id="avatar-btn"
                class="flex items-center gap-2 rounded-full hover:bg-gray-50 p-1 transition-300"
              >
                <div class="relative">
                  <div
                    class="flex size-10 rounded-full bg-custom-blue items-center justify-center shrink-0 overflow-hidden"
                  >
                    {% if user.avatar %}
                    <img
                      src="{{ user.avatar.url }}"
                      class="size-full object-cover"
                      alt=""
                    />
                    {% else %}
                    <img
                      src="{% static 'dashboard/assets/images/icons/photo-profile-default.svg' %}"
                      class="size-full object-cover"
                      alt=""
                    />
                    {% endif %}
                  </div>
                  <span
                    class="absolute bottom-0 right-0 flex size-3 bg-green-500 rounded-full border-2 border-white"
                  ></span>
                </div>
              </button>
              <!-- Dropdown menu -->
              <div
                id="avatar-dropdown"
                class="hidden absolute right-0 top-full mt-3 w-64 bg-white rounded-2xl shadow-xl ring-1 ring-gray-100 py-2 z-50"
              >
                <div
                  class="flex items-center gap-3 px-5 py-4 border-b border-gray-100"
                >
                  <div
                    class="flex size-11 rounded-full bg-custom-blue items-center justify-center shrink-0 overflow-hidden"
                  >
                    {% if user.avatar %}
                    <img
                      src="{{ user.avatar.url }}"
                      class="size-full object-cover"
                      alt=""
                    />
                    {% else %}
                    <img
                      src="{% static 'dashboard/assets/images/icons/photo-profile-default.svg' %}"
                      class="size-full object-cover"
                      alt=""
                    />
                    {% endif %}
                  </div>
                  <div class="flex flex-col">
                    <p class="font-semibold text-[15px]">
                      {{ user.get_full_name|default:user.username }}
                    </p>
                    <p class="text-sm text-custom-grey">
                      {{ user.get_role_display }}
                    </p>
                  </div>
                </div>
                <div class="py-1">
                  <a
                    href="#"
                    class="flex items-center gap-3 px-5 py-3 text-[15px] text-gray-700 hover:bg-gray-50 transition-300"
                  >
                    <svg
                      class="size-[18px] text-gray-500"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      viewBox="0 0 24 24"
                    >
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                      <circle cx="12" cy="7" r="4" />
                    </svg>
                    Profil Saya
                  </a>
                  <a
                    href="#"
                    class="flex items-center gap-3 px-5 py-3 text-[15px] text-gray-700 hover:bg-gray-50 transition-300"
                  >
                    <svg
                      class="size-[18px] text-gray-500"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      viewBox="0 0 24 24"
                    >
                      <circle cx="12" cy="12" r="3" />
                      <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                      />
                    </svg>
                    Pengaturan
                  </a>
                </div>
                <div class="border-t border-gray-100 pt-1">
                  <a
                    href="{% url 'landing_app:logout' %}"
                    class="flex items-center gap-3 px-5 py-3 text-[15px] text-gray-700 hover:bg-gray-50 transition-300"
                  >
                    <svg
                      class="size-[18px] text-gray-500"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      viewBox="0 0 24 24"
                    >
                      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                      <polyline points="16 17 21 12 16 7" />
                      <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Keluar
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>
