{% load static %}
<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Dashboard - Kopmas Shop{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'dashboard/assets/css/main.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lexend Deca", ui-sans-serif, system-ui;
        margin: 0;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .transition-300 {
        transition: all 300ms ease;
      }
      .bg-custom-background {
        background-color: #f3f5f9;
      }
      .bg-custom-blue {
        background-color: #1053d5;
      }
      .bg-custom-blue-10 {
        background-color: rgba(16, 83, 213, 0.1);
      }
      .bg-custom-black {
        background-color: #292d32;
      }
      .bg-custom-icon-background {
        background-color: #f3f3f3;
      }
      .bg-custom-stroke {
        background-color: #e8e8e8;
      }
      .text-custom-blue {
        color: #1053d5;
      }
      .text-custom-grey {
        color: #6a7686;
      }
      .text-custom-black {
        color: #292d32;
      }
      .border-custom-stroke {
        border-color: #e8e8e8;
      }
      .ring-custom-blue {
        --tw-ring-color: #1053d5;
      }
      /* Sidebar active states */
      .sidebar-item.active {
        background-color: rgba(16, 83, 213, 0.1);
      }
      .sidebar-item.active .sidebar-label {
        color: #1053d5;
      }
      .sidebar-item.active .icon-default {
        opacity: 0;
      }
      .sidebar-item.active .icon-active {
        opacity: 1;
      }
      .sidebar-item.active .active-bar {
        display: flex;
      }
      /* Accordion tree branch lines via pseudo-elements */
      .accordion-children > li {
        position: relative;
      }
      /* L-curve: vertical line from top + horizontal bend at center */
      .accordion-children > li::before {
        content: '';
        position: absolute;
        left: -20px;
        top: -2px;
        width: 20px;
        height: calc(50% + 2px);
        border-left: 1px solid #d0d5dd;
        border-bottom: 1px solid #d0d5dd;
        border-bottom-left-radius: 12px;
        pointer-events: none;
      }
      .accordion-children > li:first-child::before {
        top: 0;
        height: 50%;
      }
      /* Vertical continuation below the curve for non-last items */
      .accordion-children > li:not(:last-child)::after {
        content: '';
        position: absolute;
        left: -20px;
        top: 50%;
        bottom: -2px;
        width: 0;
        border-left: 1px solid #d0d5dd;
        pointer-events: none;
      }
      /* Prevent FOUC – JS adds .ready after layout build */
      #admin-app { opacity: 0; }
      #admin-app.ready { opacity: 1; }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body class="bg-custom-background text-custom-black">

    <!-- Dashboard config (consumed by admin-layout.js) -->
    <script>
      window.__DASHBOARD_CONFIG__ = {
        pageTitle:           "{{ page_title|default:'Dashboard'|escapejs }}",
        role:                "{% if user.is_admin %}admin{% elif user.is_seller_user %}seller{% else %}buyer{% endif %}",
        userName:            "{{ user.get_full_name|default:user.username|escapejs }}",
        userRoleDisplay:     "{{ user.get_role_display|escapejs }}",
        userAvatar:          "{% if user.avatar %}{{ user.avatar.url }}{% else %}{% static 'dashboard/assets/images/icons/photo-profile-default.svg' %}{% endif %}",
        staticIcons:         "{% static 'dashboard/assets/images/icons/' %}",
        staticLogos:         "{% static 'dashboard/assets/images/logos/' %}",
        storeProfileComplete: {% if seller_product_access_ready %}true{% else %}false{% endif %},
        urls: {
          home:            "{% url 'landing_app:home' %}",
          logout:          "{% url 'landing_app:logout' %}",
          dashboardAdmin:  "{% url 'panel_admin:dashboard_admin' %}",
          dashboardSeller: "{% url 'panel_admin:dashboard_seller' %}",
          storeList:       "{% url 'panel_admin:store_list' %}",
          categoryList:    "{% url 'panel_admin:category_list' %}",
          productManage:   "{% url 'panel_admin:product_manage' %}",
          productCreate:   "{% url 'panel_admin:product_create' %}",
          orderList:       "{% url 'panel_admin:order_list' %}",
          productReviews:  "{% url 'panel_admin:product_reviews' %}",
          userList:        "{% url 'panel_admin:user_list' %}",
          myStore:         "{% url 'panel_admin:my_store' %}"
        }
      };
    </script>

    <!-- App shell – JS reads innerHTML then wraps it with sidebar + navbar -->
    <div id="admin-app" class="min-h-screen"
         data-page-title="{{ page_title|default:'Dashboard' }}"
         data-role="{% if user.is_admin %}admin{% elif user.is_seller_user %}seller{% else %}buyer{% endif %}"
         data-product-access-ready="{% if seller_product_access_ready %}true{% else %}false{% endif %}">

      {% if messages %}
      {% for message in messages %}
      <div class="flex items-center gap-3 p-4 rounded-2xl mb-3 {% if message.tags == 'success' %}bg-green-50 text-green-700{% elif message.tags == 'danger' or message.tags == 'error' %}bg-red-50 text-red-700{% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-700{% else %}bg-blue-50 text-blue-700{% endif %}">
        <p class="font-medium text-sm">{{ message }}</p>
      </div>
      {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </div>

    <!-- Layout builder -->
    <script src="{% static 'dashboard/assets/js/admin-layout.js' %}?v=1.0.1"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
